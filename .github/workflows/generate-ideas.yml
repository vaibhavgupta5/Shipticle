name: Weekly Idea Generation
on:
  schedule:
    # Run at 08:00 UTC every Monday
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  generate-ideas:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Idea Generation API
        # Note: GitHub Actions cron scheduling is best-effort and may be deprioritized
        # on low-activity repositories. This serves as a backup to a primary cron
        # service like cron-job.org.
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/ideas/generate"
